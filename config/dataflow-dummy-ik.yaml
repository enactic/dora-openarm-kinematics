nodes:
  - id: tick   # ── tick (250 Hz) ─────────────────────────────────────────────
    build: pip install git+https://github.com/enactic/dora-openarm-quitter
    path: dora-openarm-quitter
    inputs:
      tick: dora/timer/millis/4
    outputs:
      - tick

  - id: leader
    build: pip install git+https://github.com/enactic/dora-openarm-dummy-ker.git
    path: dora-openarm-dummy-ker
    inputs:
      tick: tick/tick
    outputs:
      - position_left
      - position_right
      - follower_position_left
      - follower_position_right
      - joystick_x
      - joystick_y
      - joystick_button


  - id: fk   # ── forward kinematics: joint angles → EE poses ─────────────────
    build: pip install -e ..
    path: dora-openarm-fk
    args: "--mode bimanual"
    inputs:
      position_right: leader/follower_position_right
      position_left:  leader/follower_position_left
    outputs:
      - pose_right
      - pose_left
      - status

  - id: ik   # ── differential IK: EE poses → joint angles ────────────────────
    build: pip install -e ..
    path: dora-openarm-ik
    args: "--mode bimanual --max-iters 5 --dt 0.1 --damping 0.25 --posture-cost 0.01 --lm-damping 0.01"
    inputs:
      target_right: fk/pose_right
      target_left:  fk/pose_left
    outputs:
      - position_left
      - position_right
      - status

  - id: viewer   # ── optional: visualise leader pose ──────────────────────────
    build: pip install git+https://github.com/enactic/dora-openarm-mujoco.git
    path: dora-openarm-mujoco
    args: "--viewer"
    inputs:
      position_right: ik/position_right
      position_left:  ik/position_left
      # pose_right: fk/pose_right
      # pose_left: fk/pose_left
    outputs:
      - status
